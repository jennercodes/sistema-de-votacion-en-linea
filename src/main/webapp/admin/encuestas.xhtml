<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <title>Administrar encuestas</title>
</h:head>
<h:body>

    <h:panelGroup rendered="#{not empty encuestaBean.mensajeExito}">
        <p style="color: green;">#{encuestaBean.mensajeExito}</p>
    </h:panelGroup>

    <h1>Administrar encuestas</h1>

    <h:form id="adminForm">

        <h:button value="Nueva encuesta" outcome="/admin/formulario"/>

        <h:dataTable value="#{encuestaBean.encuestas}" var="encuesta" border="1">
            <h:column>
                <f:facet name="header">Título</f:facet>
                #{encuesta.titulo}
            </h:column>
            <h:column>
                <f:facet name="header">Opciones</f:facet>
                #{encuesta.opciones.size()}
            </h:column>
            <h:column>
                <f:facet name="header">Estado</f:facet>
                <h:outputText value="Activa" rendered="#{encuesta.activa}"/>
                <h:outputText value="Inactiva" rendered="#{!encuesta.activa}"/>
            </h:column>
            <h:column>
                <f:facet name="header">Acciones</f:facet>

                <h:button value="Editar" outcome="/admin/formulario">
                    <f:param name="encuestaId" value="#{encuesta.id}"/>
                </h:button>

                <h:commandButton value="Eliminar"
                                 action="#{encuestaBean.eliminar(encuesta.id)}"
                                 onclick="return confirm('¿Eliminar esta encuesta?');"/>

                <h:commandButton value="#{encuesta.activa ? 'Desactivar' : 'Activar'}"
                                 action="#{encuestaBean.toggleActiva(encuesta)}"/>
            </h:column>
        </h:dataTable>

        <hr/>
        <h:button value="Volver al inicio" outcome="/index"/>
    </h:form>
</h:body>
</html>
