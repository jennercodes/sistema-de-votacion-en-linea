<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:p="http://primefaces.org/ui">
<f:metadata>
    <f:viewParam name="encuestaId" value="#{encuestaBean.encuestaId}"/>
    <f:viewAction action="#{encuestaBean.cargarEncuesta()}"/>
</f:metadata>
<h:head>
    <title>Formulario de encuesta</title>
    <h:outputStylesheet library="primefaces-saga" name="theme.css"/>
    <style>
        body { font-family: var(--font-family, 'Lato', 'Helvetica Neue', Arial, sans-serif); }
        h1, h2, h3 { font-family: inherit; font-weight: 600; }
        h1 { margin: 0 0 1rem 0; }
        .card { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-radius: .5rem; }
        .field { margin: 1rem 0; }
        .field label { display: inline-block; min-width: 7rem; }
        .opcion-row { display: flex; gap: .5rem; align-items: center; margin: .5rem 0; }
        .alert { padding: .75rem 1rem; border-radius: 4px; margin: 1rem 0; border: 1px solid transparent; }
        .alert-success { background: #e6f4ea; border-color: #b7e0c2; color: #1e7e34; }
        .alert-error { background: #fdecea; border-color: #f5c2c0; color: #b71c1c; }
    </style>
</h:head>
<h:body>

    <div class="card" style="margin: 2rem auto; max-width: 900px; padding: 1.5rem">

        <h1>
            <h:outputText value="✎ Editar encuesta"  rendered="#{encuestaBean.encuestaActual.id != 0}"/>
            <h:outputText value="✚ Nueva encuesta"   rendered="#{encuestaBean.encuestaActual.id == 0}"/>
        </h1>

        <p:messages id="formMessages" showDetail="true" closable="true"/>

        <h:form id="encuestaForm">

            <h:panelGroup rendered="#{not empty encuestaBean.mensajeError}">
                <div class="alert alert-error"><h:outputText value="#{encuestaBean.mensajeError}"/></div>
            </h:panelGroup>

            <h:panelGroup rendered="#{not empty encuestaBean.mensajeExito}">
                <div class="alert alert-success"><h:outputText value="#{encuestaBean.mensajeExito}"/></div>
            </h:panelGroup>

            <div class="field">
                <h:outputLabel for="titulo" value="Título: "/>
                <p:inputText id="titulo" value="#{encuestaBean.encuestaActual.titulo}"/>
            </div>

            <div class="field">
                <h:outputLabel for="descripcion" value="Descripción: "/>
                <p:inputTextarea id="descripcion" value="#{encuestaBean.encuestaActual.descripcion}" rows="3"/>
            </div>

            <div class="field">
                <h:outputLabel for="fechaFin" value="Fecha/Hora Cierre: "/>
                <p:datePicker id="fechaFin" value="#{encuestaBean.encuestaActual.fechaFin}"
                              showTime="true" pattern="dd/MM/yyyy HH:mm" hourFormat="24"
                              placeholder="Sin fecha de cierre (indefinida)" showButtonBar="true"/>
            </div>

            <h3>Opciones <span style="font-size: 0.8rem; color: #666;">(#{encuestaBean.opcionesTexto.size()} / 6)</span></h3>

            <ui:repeat value="#{encuestaBean.opcionesTexto}" var="texto" varStatus="status">
                <div class="opcion-row">
                    <p:inputText value="#{encuestaBean.opcionesTexto[status.index]}"
                                 placeholder="Opción #{status.index + 1}"/>
                    <p:commandButton icon="pi pi-times"
                                     title="Eliminar opción"
                                     action="#{encuestaBean.eliminarOpcion(status.index)}"
                                     update="@form"
                                     disabled="#{!encuestaBean.puedeEliminarOpcion()}"/>
                </div>
            </ui:repeat>

            <p>
                <p:commandButton value="+ Agregar opción"
                                icon="pi pi-plus"
                                action="#{encuestaBean.agregarOpcion()}"
                                update="@form"
                                disabled="#{!encuestaBean.puedeAgregarOpcion()}"/>
            </p>

            <hr/>

            <p:commandButton value="Guardar" icon="pi pi-save" action="#{encuestaBean.guardar()}" styleClass="p-button-success p-button-lg"/>
            <p:button value="Cancelar" icon="pi pi-times" outcome="/admin/encuestas" styleClass="p-button-secondary p-button-lg" style="margin-left: .5rem;"/>
        </h:form>

    </div>

</h:body>
</html>
