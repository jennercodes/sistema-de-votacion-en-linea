<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Resultados</title>
    <h:outputStylesheet library="primefaces-saga" name="theme.css"/>
    <style>
        body { font-family: var(--font-family, 'Lato', 'Helvetica Neue', Arial, sans-serif); }
        h1, h2, h3 { font-family: inherit; font-weight: 600; }
        h1 { margin: 0 0 1rem 0; }
        .card { background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-radius: .5rem; }
    </style>
</h:head>
<h:body>

    <div class="card" style="margin: 2rem auto; max-width: 900px; padding: 1.5rem">

        <h1>Resultados</h1>

        <p:messages id="resultadosMessages" showDetail="true" closable="true"/>

        <h:panelGroup rendered="#{empty votacionBean.encuestaActual or empty votacionBean.resultados}">
            <p>Aún no hay resultados para mostrar.</p>
        </h:panelGroup>

        <h:panelGroup rendered="#{not empty votacionBean.encuestaActual and not empty votacionBean.resultados}">
            <h2>#{votacionBean.encuestaActual.titulo}</h2>

            <p:dataTable value="#{votacionBean.resultados.entrySet().toArray()}" var="entry">
                <p:column headerText="Opción">
                    #{entry.key}
                </p:column>
                <p:column headerText="Votos">
                    #{entry.value}
                </p:column>
                <p:column headerText="Porcentaje">
                    <h:outputText value="#{votacionBean.obtenerPorcentaje(entry.value, votacionBean.totalVotos)}">
                        <f:convertNumber pattern="0.0"/>
                    </h:outputText> %
                </p:column>
            </p:dataTable>

            <p>Total de votos: #{votacionBean.totalVotos}</p>
        </h:panelGroup>

        <h:form>
            <p:button value="Volver al inicio" icon="pi pi-home" outcome="/index"/>
        </h:form>

    </div>

</h:body>
</html>
