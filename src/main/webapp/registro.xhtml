<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Registro de Votante - Sistema de Votación</title>
    <h:outputStylesheet library="primefaces-saga" name="theme.css"/>
    <h:outputStylesheet name="css/custom-style.css"/>
</h:head>
<h:body>

    <div class="auth-container" style="margin-top: 3.5rem;">
        <div class="glass-card">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="pi pi-user-plus" style="font-size: 3rem; color: var(--success); margin-bottom: 0.5rem;"></i>
                <h1 style="margin: 0; font-size: 1.75rem;">Registro de Votante</h1>
                <p style="color: var(--text-muted); margin: 0.25rem 0 0 0;">Crea una cuenta para emitir tus votos</p>
            </div>

            <h:form id="registerForm">
                <p:messages id="messages" showDetail="true" closable="true"/>

                <div class="field">
                    <h:outputLabel for="username" value="Nombre de Usuario:"/>
                    <p:inputText id="username" value="#{registroBean.username}" required="true" 
                                 requiredMessage="El nombre de usuario es obligatorio."
                                 placeholder="Elige tu nombre de usuario" />
                </div>

                <div class="field">
                    <h:outputLabel for="email" value="Correo Electrónico:"/>
                    <p:inputText id="email" value="#{registroBean.email}" required="true" 
                                 requiredMessage="El correo electrónico es obligatorio."
                                 placeholder="correo@ejemplo.com">
                        <f:validateRegex pattern="[\w\.-]+@[\w\.-]+\.\w+" />
                    </p:inputText>
                </div>

                <div class="field">
                    <h:outputLabel for="password" value="Contraseña:"/>
                    <p:password id="password" value="#{registroBean.password}" required="true"
                                requiredMessage="La contraseña es obligatoria."
                                placeholder="Crea una contraseña segura" match="confirmPassword"
                                validatorMessage="Las contraseñas no coinciden." toggleMask="true"/>
                </div>

                <div class="field">
                    <h:outputLabel for="confirmPassword" value="Confirmar Contraseña:"/>
                    <p:password id="confirmPassword" value="#{registroBean.confirmPassword}" required="true"
                                requiredMessage="Confirmar la contraseña es obligatorio."
                                placeholder="Repite la contraseña" toggleMask="true"/>
                </div>

                <div style="margin-top: 2rem;">
                    <p:commandButton value="Registrarse" action="#{registroBean.registrar}" 
                                     update="messages" styleClass="p-button-success p-button-lg" icon="pi pi-user-plus" 
                                     style="width: 100%;" />
                </div>

                <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; border-top: 1px solid var(--border-color); padding-top: 1.25rem;">
                    <span style="color: var(--text-muted);">¿Ya tienes una cuenta? </span>
                    <p:link value="Inicia sesión aquí" outcome="login" style="font-weight: 600; text-decoration: none;" />
                    <br/><br/>
                    <p:button value="Volver al inicio" outcome="index" icon="pi pi-home" styleClass="p-button-secondary p-button-outlined p-button-sm" />
                </div>
            </h:form>
        </div>
    </div>

</h:body>
</html>
