<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Registrarse</title>
    <h:outputStylesheet library="primefaces-saga" name="theme.css"/>
    <style>
        body {
            font-family: var(--font-family, 'Lato', 'Helvetica Neue', Arial, sans-serif);
            background-color: #f8f9fa;
        }
        .register-card {
            background: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,.08);
            border-radius: .75rem;
            margin: 4rem auto;
            max-width: 400px;
            padding: 2.5rem;
        }
        h1 {
            text-align: center;
            margin: 0 0 1.5rem 0;
            font-size: 1.75rem;
            color: #333;
        }
        .field {
            margin-bottom: 1.25rem;
        }
        .field label {
            display: block;
            margin-bottom: .5rem;
            font-weight: 500;
            color: #495057;
        }
        .btn-full {
            width: 100%;
        }
        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
    </style>
</h:head>
<h:body>

    <div class="register-card">
        <h1>Registro de Votante</h1>
        <h:form id="registerForm">
            <p:messages id="messages" showDetail="true" closable="true"/>

            <div class="field">
                <label for="username">Nombre de usuario</label>
                <p:inputText id="username" value="#{registroBean.username}" required="true" 
                             requiredMessage="El usuario es obligatorio." style="width: 100%"
                             placeholder="Elige tu usuario" />
            </div>

            <div class="field">
                <label for="email">Correo electrónico</label>
                <p:inputText id="email" value="#{registroBean.email}" required="true" 
                             requiredMessage="El correo electrónico es obligatorio." style="width: 100%"
                             placeholder="tucorreo@ejemplo.com">
                    <f:validateRegex pattern="[\w\.-]+@[\w\.-]+\.\w+" />
                </p:inputText>
            </div>

            <div class="field">
                <label for="password">Contraseña</label>
                <p:password id="password" value="#{registroBean.password}" required="true"
                            requiredMessage="La contraseña es obligatoria." style="width: 100%"
                            placeholder="Crea una contraseña" match="confirmPassword"
                            validatorMessage="Las contraseñas no coinciden." />
            </div>

            <div class="field">
                <label for="confirmPassword">Confirmar contraseña</label>
                <p:password id="confirmPassword" value="#{registroBean.confirmPassword}" required="true"
                            requiredMessage="Confirmar la contraseña es obligatorio." style="width: 100%"
                            placeholder="Repite la contraseña" />
            </div>

            <p:commandButton value="Registrarse" action="#{registroBean.registrar}" 
                             update="messages" styleClass="btn-full ui-button-success" icon="pi pi-user-plus" />

            <div class="footer-links">
                ¿Ya tienes una cuenta? <p:link value="Inicia sesión aquí" outcome="login" />
                <br/><br/>
                <p:link value="Volver al inicio" outcome="index" icon="pi pi-arrow-left" />
            </div>
        </h:form>
    </div>

</h:body>
</html>
